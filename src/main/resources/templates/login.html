<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8" />
<title th:replace="~{fragments/layoutLogin :: title}">Title</title>

<th:block th:insert="~{fragments/layoutLogin :: meta}"></th:block>

<th:block th:insert="~{fragments/layoutLogin :: link}"></th:block>

<th:block th:insert="~{fragments/layoutLogin :: head/script}"></th:block>
</head>
<body class="login">
	<!-- BEGIN : LOGIN PAGE 5-1 -->
	<div class="user-login-5">
		<div class="row bs-reset">

			<div class="col-md-8 bs-reset mt-login-5-bsfix hidden-xs">
				<div class="login-bg"
					style="background-image: url(/assets/pages/img/login/bg2.jpg)"></div>
				<div class="about-header" id="top-video"></div>
			</div>

			<div class="col-md-4 login-container bs-reset mt-login-5-bsfix">
				<div id="pop-login" class="modal fade" data-width="1000"
					role="dialog" aria-labelledby="myModalLabel10" aria-hidden="true">
					<div class="modal-dialog w1000">
						<div class="modal-content play-video"></div>
					</div>
				</div>
				<div class="login-content">
					<a style="display: none" id="btn-login-watch-video"
						class="btn green" data-toggle='modal' data-target='#pop-login'
						href=""> </a>
					<div class="logo-lms">
						<img style="width: 260px; margin-top: 100px;"
							src="/images/logo-letter.png" />
					</div>
					<h1 class="logon-lms">Đăng nhập thư viện</h1>

					<!-- /login?error=true -->
					<div th:if="${#request.getParameter('error') == 'true'}"
						style="color: red; margin: 10px 0px;">
						Login Failed!!!<br /> Reason : <span
							th:if="${#session!= null and #session.getAttribute('SPRING_SECURITY_LAST_EXCEPTION') != null}"
							th:utext="${#session.getAttribute('SPRING_SECURITY_LAST_EXCEPTION').message}">
							Static summary </span>

					</div>

					<form class="login-form" th:action="@{/j_spring_security_check}"
						method="post">
						<div class="row">
							<div class="col-xs-12">
								<input id="UserName"
									class="form-control form-control-solid placeholder-no-fix form-group"
									type="text" name="username" autocomplete="off"
									placeholder="Tài khoản" />
							</div>
						</div>
						<div class="row">
							<div class="col-xs-12">
								<input id="Password"
									class="form-control form-control-solid placeholder-no-fix form-group"
									type="password" name="password" autocomplete="off"
									placeholder="Mật khẩu" />
							</div>
						</div>
						<div class="row">
							<div class="col-xs-12">
								<div class="rem-password">
									<label class="rememberme mt-checkbox mt-checkbox-outline">
										<input data-val="true"
										data-val-required="Tự động đăng nhập lần sau" id="RememberMe"
										name="remember-me" type="checkbox" value="true"><input
										name="RememberMe" type="hidden" value="false"> Tự động
										đăng nhập lần sau <span></span>
									</label>
								</div>
							</div>
						</div>
						<div class="row">
							<div class="col-sm-12 text-center">
								<button id="btnSubmitLogin" class="btn btn-sm blue"
									type="submit">Đăng nhập</button>

							</div>
						</div>
						<div class="row" style="margin-top: 10px">
							<div class="col-sm-12">
								<a href="/account/forgetpassword">
									<button type="button" class="btn btn-sm blue"
										id="forget-username">Quên mật khẩu</button>
								</a>
							</div>
						</div>
					</form>
				</div>
				<div class="login-footer">
					<div class="row bs-reset">
						<div class="col-md-12 col-sm-12 col-xs-12 pl0 bs-reset">
							<div class="login-copyright text-right">
								<p>Version 1.0 Copyright &copy; 2021 FIT Inc. All rights
									reserved.</p>
							</div>
						</div>
					</div>
				</div>
				<div th:insert="~{fragments/loadingPartial :: loadingPartial}"></div>
			</div>
		</div>
	</div>
</body>
<script>
	var Login = function() {

		var handleLogin = function() {

			$('.login-form').validate({
				errorElement : 'span', //default input error message container
				errorClass : 'help-block', // default input error message class
				focusInvalid : false, // do not focus the last invalid input
				rules : {
					username : {
						required : true
					},
					password : {
						required : true
					},
					remember : {
						required : false
					}
				},

				messages : {
					username : {
						required : "Username is required."
					},
					password : {
						required : "Password is required."
					}
				},

				invalidHandler : function(event, validator) { //display error alert on form submit
					$('.alert-danger', $('.login-form')).show();
				},

				highlight : function(element) { // hightlight error inputs
					$(element).closest('.form-group').addClass('has-error'); // set error class to the control group
				},

				success : function(label) {
					label.closest('.form-group').removeClass('has-error');
					label.remove();
				},

				errorPlacement : function(error, element) {
					error.insertAfter(element.closest('.input-icon'));
				},

				submitHandler : function(form) {
					form.submit(); // form validation success, call ajax form submit
				}
			});

			$('.login-form input').keypress(function(e) {
				if (e.which == 13) {
					if ($('.login-form').validate().form()) {
						$('.login-form').submit(); //form validation success, call ajax form submit
					}
					return false;
				}
			});

			$('.forget-form input').keypress(function(e) {
				if (e.which == 13) {
					if ($('.forget-form').validate().form()) {
						$('.forget-form').submit();
					}
					return false;
				}
			});

			$('#forget-password').click(function() {
				$('.login-form').hide();
				$('.forget-form').show();
			});

			$('#back-btn').click(function() {
				$('.login-form').show();
				$('.forget-form').hide();
			});
		}

		return {
			//main function to initiate the module
			init : function() {

				handleLogin();

				// init background slide images
				$('.login-bg').backstretch(
						[ "../assets/pages/img/login/bg2.jpg",
								"../assets/pages/img/login/bg3.jpg" ], {
							fade : 1000,
							duration : 8000
						});
				console.log('running')

				$('.forget-form').hide();

			}

		};

	}();

	jQuery(document).ready(function() {
		Login.init();
	});
</script>
</html>
